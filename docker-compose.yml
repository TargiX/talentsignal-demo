services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: charforge
      MYSQL_USER: charforge
      MYSQL_PASSWORD: charforge
      MYSQL_ROOT_PASSWORD: charforge
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucharforge", "-pcharforge"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  dynamodb:
    image: amazon/dynamodb-local:2.5.4
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: CharforgeLocal1!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  mysql-data:
  opensearch-data:
